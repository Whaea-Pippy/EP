<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebraic Substitution</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500&display=swap');
        :root { --tile-size: 68px; }
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        
        #app {
            width: 100%; max-width: 920px;
            background: white; border-radius: 24px;
            box-shadow: 25px 25px 50px -12px rgb(15 23 42 / 0.15);
            padding: 32px 40px;
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.75rem; font-weight: 500;
            text-align: center; margin: 0 0 8px;
            background: linear-gradient(to right, #0ea5e9, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .subtitle { text-align: center; color: #64748b; margin-bottom: 32px; font-size: 1.1rem; }
        
        #tile-row {
            display: flex; justify-content: center; gap: 16px;
            margin-bottom: 48px; padding: 12px 0;
            background: #f8fafc; border-radius: 20px;
        }
        
        .slot { width: var(--tile-size); height: var(--tile-size); }
        
        .tile {
            width: 100%; height: 100%;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.1rem; font-weight: 700;
            box-shadow: 6px 6px 12px -4px rgb(15 23 42 / 0.2),
                        inset 0 -3px 4px rgba(255,255,255,0.4);
            cursor: pointer;
            transition: all 0.4s ease;
            user-select: none;
        }
        .tile:hover { transform: scale(1.08) translateY(-2px); }
        .tile.faded { opacity: 0.35; cursor: not-allowed; }
        
        #equation-area {
            background: #f8fafc; border-radius: 20px;
            padding: 32px 40px; margin-bottom: 32px;
            min-height: 110px; display: flex; align-items: center; justify-content: center;
        }
        
        .equation {
            display: flex; align-items: center;
            font-size: 3.2rem; font-weight: 600;
            font-family: 'Space Grotesk', sans-serif; gap: 8px;
        }
        
        .equation .tile {
            width: var(--tile-size); height: var(--tile-size);
            border-radius: 14px;
        }
        
        .times {
            color: #ef4444;
            font-size: 3.2rem;
            font-weight: 600;
            margin: 0 6px;
        }
        
        #steps-area {
            background: white; border: 3px solid #e2e8f0;
            border-radius: 16px; padding: 24px 32px; min-height: 180px;
        }
        
        .step {
            display: flex; align-items: center;
            font-size: 2.4rem; font-family: 'Space Grotesk', sans-serif;
            margin: 14px 0; animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .step .equals { width: 52px; text-align: right; margin-right: 24px; color: #64748b; font-weight: 600; }
        
        .controls { display: flex; justify-content: center; margin-top: 30px; }
        
        button {
            background: linear-gradient(to right, #0ea5e9, #8b5cf6);
            color: white; border: none; padding: 16px 52px;
            font-size: 1.4rem; font-weight: 600; border-radius: 9999px;
            cursor: pointer;
        }
        button:hover { transform: translateY(-3px); }
    </style>
</head>
<body>
    <div id="app">
        <h1>Algebraic Substitution</h1>
        <p class="subtitle">Click a variable or number to substitute into the expression</p>
        
        <div id="tile-row"></div>
        
        <div id="equation-area">
            <div id="equation-display" class="equation"></div>
        </div>
        
        <div id="steps-area">
            <div id="steps-container"></div>
        </div>
        
        <div class="controls">
            <button id="new-equation-btn">Next Expression</button>
        </div>
    </div>

    <script>
        const PRESETS = ["x", "x + 2", "x - 3", "2 + x", "3x", "3x + 2", "2x + 5", "5x - 2", "x + 5", "10 - x"];
        
        const COLORS = {
            'x': { bg: '#0ea5e9', text: '#fff' },
            'a': { bg: '#10b981', text: '#fff' },
            'b': { bg: '#8b5cf6', text: '#fff' },
            '0': { bg: '#64748b', text: '#fff' },
            '1': { bg: '#f59e0b', text: '#1e2937' },
            '2': { bg: '#ec4899', text: '#fff' },
            '3': { bg: '#ef4444', text: '#fff' },
            '4': { bg: '#14b8a6', text: '#fff' },
            '5': { bg: '#3b82f6', text: '#fff' }
        };

        let currentIndex = 0;
        let currentExpr = PRESETS[0];
        let currentSubTile = null;   // the faded tile in the row
        let animating = false;

        function tokenize(expr) {
            const tokens = [];
            const regex = /([0-9]+|x|[\+\-])/g;
            let m;
            while ((m = regex.exec(expr)) !== null) {
                const val = m[1];
                if (/[0-9]/.test(val)) tokens.push({ type: 'number', value: val });
                else if (val === 'x') tokens.push({ type: 'var', value: 'x' });
                else tokens.push({ type: 'op', value: val });
            }
            return tokens;
        }

        function createTile(content) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            const cfg = COLORS[content] || COLORS['5'];
            tile.style.backgroundColor = cfg.bg;
            tile.style.color = cfg.text;
            tile.textContent = content;
            return tile;
        }

        function handleSubstitution(e) {
            if (animating) return;
            animating = true;

            const newTile = e.currentTarget;
            const subValue = newTile.textContent;
            const isNumber = /^[0-9]$/.test(subValue);

            const varTile = document.querySelector('.equation .tile');
            if (!varTile) { animating = false; return; }

            // === 1. Animate the OLD substituted tile BACK to the row ===
            if (currentSubTile && currentSubTile !== newTile) {
                const oldRect = varTile.getBoundingClientRect();
                const homeRect = currentSubTile.getBoundingClientRect();

                const returner = varTile.cloneNode(true);
                returner.style.position = 'fixed';
                returner.style.left = oldRect.left + 'px';
                returner.style.top = oldRect.top + 'px';
                returner.style.width = oldRect.width + 'px';
                returner.style.height = oldRect.height + 'px';
                returner.style.zIndex = 999;
                returner.style.transition = 'all 0.55s cubic-bezier(0.4, 0, 0.2, 1)';
                document.body.appendChild(returner);

                // Fly back
                requestAnimationFrame(() => {
                    returner.style.left = homeRect.left + 'px';
                    returner.style.top = homeRect.top + 'px';
                    varTile.style.opacity = '0';
                });

                setTimeout(() => {
                    currentSubTile.classList.remove('faded');
                    document.body.removeChild(returner);
                    varTile.style.opacity = '1';
                    flyNewTileIn(newTile, subValue, isNumber, varTile);
                }, 580);
            } else {
                // No previous tile — just fly the new one in
                flyNewTileIn(newTile, subValue, isNumber, varTile);
            }
        }

        function flyNewTileIn(newTile, subValue, isNumber, varTile) {
            const sourceRect = newTile.getBoundingClientRect();
            const targetRect = varTile.getBoundingClientRect();

            const flyer = newTile.cloneNode(true);
            flyer.style.position = 'fixed';
            flyer.style.left = sourceRect.left + 'px';
            flyer.style.top = sourceRect.top + 'px';
            flyer.style.width = sourceRect.width + 'px';
            flyer.style.height = sourceRect.height + 'px';
            flyer.style.zIndex = 1000;
            flyer.style.transition = 'all 0.65s cubic-bezier(0.4, 0, 0.2, 1)';
            document.body.appendChild(flyer);

            requestAnimationFrame(() => {
                flyer.style.left = targetRect.left + 'px';
                flyer.style.top = targetRect.top + 'px';
                varTile.style.opacity = '0.3';
            });

            setTimeout(() => {
                varTile.textContent = subValue;
                varTile.style.backgroundColor = COLORS[subValue].bg;
                varTile.style.color = COLORS[subValue].text;
                varTile.style.opacity = '1';
                varTile.style.transform = 'scale(1.15)';

                updateEquationDisplay(subValue, isNumber);
                updateSteps(subValue, isNumber);

                document.body.removeChild(flyer);

                setTimeout(() => {
                    varTile.style.transform = 'scale(1)';
                    animating = false;
                }, 250);
            }, 650);
        }

        // Rest of the functions remain the same
        function updateEquationDisplay(subValue, isNumber) {
            const display = document.getElementById('equation-display');
            display.innerHTML = '';
            const eq = document.createElement('div');
            eq.className = 'equation';

            const tokens = tokenize(currentExpr);
            let hasCoeff = false;
            let varIndex = -1;

            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].type === 'var') {
                    varIndex = i;
                    if (i > 0 && tokens[i-1] && tokens[i-1].type === 'number') hasCoeff = true;
                    break;
                }
            }

            for (let i = 0; i < tokens.length; i++) {
                const tok = tokens[i];
                if (tok.type === 'var') {
                    if (hasCoeff && isNumber) {
                        const coeff = document.createElement('span');
                        coeff.textContent = tokens[i-1].value;
                        eq.appendChild(coeff);

                        const times = document.createElement('span');
                        times.className = 'times';
                        times.textContent = '×';
                        eq.appendChild(times);
                    }
                    eq.appendChild(createTile(subValue));
                } else if (tok.type === 'number' && i === varIndex - 1 && hasCoeff && isNumber) {
                    continue;
                } else if (tok.type === 'op') {
                    const op = document.createElement('span');
                    op.textContent = " " + tok.value + " ";
                    eq.appendChild(op);
                } else {
                    const span = document.createElement('span');
                    span.textContent = tok.value;
                    eq.appendChild(span);
                }
            }
            display.appendChild(eq);
        }

        function updateSteps(subValue, isNumber) {
            const tokens = tokenize(currentExpr);
            const container = document.getElementById('steps-container');
            container.innerHTML = '';

            let step1 = "";
            let hasCoeff = false;
            let varIndex = -1;

            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].type === 'var') {
                    varIndex = i;
                    if (i > 0 && tokens[i-1] && tokens[i-1].type === 'number') hasCoeff = true;
                    break;
                }
            }

            for (let i = 0; i < tokens.length; i++) {
                const tok = tokens[i];
                if (tok.type === 'var') {
                    if (hasCoeff && isNumber) step1 += tokens[i-1].value + " × " + subValue;
                    else step1 += subValue;
                } else if (tok.type === 'number' && i === varIndex - 1 && hasCoeff && isNumber) {
                    continue;
                } else if (tok.type === 'op') {
                    step1 += " " + tok.value + " ";
                } else {
                    step1 += tok.value;
                }
            }

            renderStep(step1.trim());

            if (!isNumber) return;

            const val = parseInt(subValue);
            const coeff = hasCoeff ? parseInt(tokens[varIndex-1].value) : 1;
            const product = coeff * val;

            if (tokens.length > 1) {
                const opTok = tokens.find(t => t.type === 'op');
                const numTok = tokens.find((t, idx) => t.type === 'number' && idx !== (varIndex - 1));
                const otherNum = numTok ? parseInt(numTok.value) : 0;

                if (coeff !== 1) renderStep(product + " " + opTok.value + " " + otherNum);
                const final = (opTok.value === '+') 
                    ? (varIndex > 1 ? otherNum + val : product + otherNum)
                    : (varIndex > 1 ? otherNum - val : product - otherNum);
                renderStep(final);
            } else if (coeff !== 1) {
                renderStep(product);
            }
        }

        function renderStep(text) {
            const d = document.createElement('div');
            d.className = 'step';
            d.innerHTML = `<span class="equals">=</span><span class="expr">${text}</span>`;
            document.getElementById('steps-container').appendChild(d);
        }

        function loadEquation() {
            currentExpr = PRESETS[currentIndex];
            currentSubTile = null;

            updateEquationDisplay('x', false);
            document.getElementById('steps-container').innerHTML = '';

            document.querySelectorAll('.tile').forEach(t => t.classList.remove('faded'));
        }

        function init() {
            const row = document.getElementById('tile-row');
            ['x', 'a', 'b', '0', '1', '2', '3', '4', '5'].forEach(char => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                const tile = createTile(char);
                tile.addEventListener('click', handleSubstitution);
                slot.appendChild(tile);
                row.appendChild(slot);
            });

            loadEquation();

            document.getElementById('new-equation-btn').onclick = () => {
                currentIndex = (currentIndex + 1) % PRESETS.length;
                loadEquation();
            };
        }

        window.onload = init;
    </script>
</body>
</html>
